name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
  workflow_dispatch:

jobs:
  # TODO (az CLI 2.86.0, May 2026): update deprecated postgres flexible-server args:
  #   firewall-rule: --name (server) → --server-name, --rule-name (rule) → --name
  #   backup create: --name (server) → --server-name, --backup-name → --name
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install uv && uv sync

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get runner IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to PostgreSQL firewall
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ vars.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}

      - name: Check for pending migrations
        id: check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: '5432'
        run: |
          uv run python -c "
          import django, os
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'app.settings')
          django.setup()
          from django.db import connection
          connection.ensure_connection()
          print('Database connection OK')
          " || { echo "::error::Cannot connect to production database."; exit 1; }

          if uv run python manage.py migrate --check; then
            echo "No pending migrations — skipping replica test."
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pending migrations detected:"
            uv run python manage.py showmigrations --plan | grep "\[ \]" || true
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DB tier
        if: steps.check.outputs.pending == 'true'
        id: tier
        run: |
          SKU_TIER=$(az postgres flexible-server show \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ vars.AZURE_POSTGRES_SERVER_NAME }} \
            --query sku.tier -o tsv)
          echo "DB tier: $SKU_TIER"
          echo "tier=$SKU_TIER" >> "$GITHUB_OUTPUT"
          if [ "$SKU_TIER" = "Burstable" ]; then
            echo "supports_replica=false" >> "$GITHUB_OUTPUT"
          else
            echo "supports_replica=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and promote DB replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        id: replica
        run: |
          REPLICA_NAME="${{ vars.AZURE_POSTGRES_SERVER_NAME }}-replica"
          echo "name=$REPLICA_NAME" >> "$GITHUB_OUTPUT"
          echo "Creating replica: $REPLICA_NAME"
          az postgres flexible-server replica create \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --source-server ${{ vars.AZURE_POSTGRES_SERVER_NAME }} \
            --name "$REPLICA_NAME"
          echo "Promoting replica to read-write..."
          az postgres flexible-server replica promote \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" --yes
          echo "Adding runner IP to replica firewall..."
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" \
            --rule-name github-runner \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}
          REPLICA_HOST=$(az postgres flexible-server show \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          echo "host=$REPLICA_HOST" >> "$GITHUB_OUTPUT"

      - name: Test migration on replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ steps.replica.outputs.host }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: '5432'
        run: |
          echo "Running test migration on replica..."
          uv run python manage.py migrate --no-input

      - name: Backup production DB
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        run: |
          BACKUP_NAME="pre-deploy-$(date -u +%Y%m%d-%H%M%S)"
          echo "Creating production backup: $BACKUP_NAME"
          az postgres flexible-server backup create \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ vars.AZURE_POSTGRES_SERVER_NAME }} \
            --backup-name "$BACKUP_NAME"

      - name: Run migration on production DB
        if: steps.check.outputs.pending == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: '5432'
        run: uv run python manage.py migrate --no-input

      - name: Delete replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true' && always()
        run: |
          az postgres flexible-server delete \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "${{ steps.replica.outputs.name }}" --yes 2>/dev/null || true

      - name: Remove runner IP from firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ vars.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ vars.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner --yes 2>/dev/null || true

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}

      - name: Build and push Docker image
        id: image
        working-directory: backend
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/1reach-backend:${{ github.sha }}"
          IMAGE_LATEST="${{ vars.ACR_LOGIN_SERVER }}/1reach-backend:latest"
          docker build \
            --build-arg DEPLOY_SHA=${{ github.sha }} \
            -t "$IMAGE" \
            -t "$IMAGE_LATEST" \
            .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "tag=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-bicep:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure + app via Bicep
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters \
              ENVIRONMENT_NAME="${{ vars.ENVIRONMENT_NAME }}" \
              ACR_NAME="${{ vars.ACR_NAME }}" \
              CREATE_ACR="${{ vars.CREATE_ACR }}" \
              ACR_LOGIN_SERVER="${{ vars.ACR_LOGIN_SERVER }}" \
              IMAGE_NAME="${{ needs.build-and-push.outputs.image_tag }}" \
              USE_VNET="${{ vars.USE_VNET }}" \
              VNET_NAME="${{ vars.VNET_NAME }}" \
              VNET_CIDR="${{ vars.VNET_CIDR }}" \
              ACA_SUBNET_CIDR="${{ vars.ACA_SUBNET_CIDR }}" \
              PE_SUBNET_CIDR="${{ vars.PE_SUBNET_CIDR }}" \
              API_MIN_REPLICAS=${{ vars.API_MIN_REPLICAS }} \
              API_MAX_REPLICAS=${{ vars.API_MAX_REPLICAS }} \
              WORKER_MIN_REPLICAS=${{ vars.WORKER_MIN_REPLICAS }} \
              WORKER_MAX_REPLICAS=${{ vars.WORKER_MAX_REPLICAS }} \
              API_CPU="${{ vars.API_CPU }}" \
              API_MEMORY="${{ vars.API_MEMORY }}" \
              WORKER_CPU="${{ vars.WORKER_CPU }}" \
              WORKER_MEMORY="${{ vars.WORKER_MEMORY }}" \
              BEAT_CPU="${{ vars.BEAT_CPU }}" \
              BEAT_MEMORY="${{ vars.BEAT_MEMORY }}" \
              DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
              CLERK_WEBHOOK_SIGNING_SECRET="${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}" \
              STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              CELERY_BROKER_URL="${{ secrets.CELERY_BROKER_URL }}" \
              AZURE_STORAGE_ACCOUNT_KEY="${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
              WELCORP_PASSWORD="${{ secrets.WELCORP_PASSWORD }}" \
              WELCORP_CALLBACK_SECRET="${{ secrets.WELCORP_CALLBACK_SECRET }}" \
              POSTGRES_HOST="${{ vars.POSTGRES_HOST }}" \
              POSTGRES_DB="${{ vars.POSTGRES_DB }}" \
              POSTGRES_USER="${{ vars.POSTGRES_USER }}" \
              CLERK_FRONTEND_API="${{ vars.CLERK_FRONTEND_API }}" \
              CLERK_AUTHORIZED_PARTIES="${{ vars.CLERK_AUTHORIZED_PARTIES }}" \
              ALLOWED_HOSTS="${{ vars.ALLOWED_HOSTS }}" \
              CORS_ALLOWED_ORIGINS="${{ vars.CORS_ALLOWED_ORIGINS }}" \
              BASE_URL="${{ vars.BASE_URL }}" \
              STORAGE_PROVIDER_CLASS="${{ vars.STORAGE_PROVIDER_CLASS }}" \
              AZURE_STORAGE_ACCOUNT_NAME="${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}" \
              AZURE_CONTAINER="${{ vars.AZURE_CONTAINER }}" \
              SMS_PROVIDER_CLASS="${{ vars.SMS_PROVIDER_CLASS }}" \
              WELCORP_BASE_URL="${{ vars.WELCORP_BASE_URL }}" \
              WELCORP_USERNAME="${{ vars.WELCORP_USERNAME }}" \
              SENTRY_DSN="${{ vars.SENTRY_DSN }}" \
              SENTRY_ENVIRONMENT="${{ vars.SENTRY_ENVIRONMENT }}" \
              FREE_CREDIT_AMOUNT="${{ vars.FREE_CREDIT_AMOUNT }}" \
              SMS_RATE="${{ vars.SMS_RATE }}" \
              MMS_RATE="${{ vars.MMS_RATE }}" \
              DEBUG="${{ vars.DEBUG }}" \
              TEST="${{ vars.TEST }}" \
              SKIP_AUTO_MIGRATE="${{ vars.SKIP_AUTO_MIGRATE }}"

  verify-health:
    needs: deploy-bicep
    runs-on: ubuntu-latest
    steps:
      - name: Wait for new instance (smoke test + version check)
        run: |
          URL="${{ vars.VITE_API_BASE_URL_PROD }}/api/health/smoke/"
          EXPECTED_SHA="${{ github.sha }}"
          echo "Polling $URL until version=$EXPECTED_SHA..."
          for i in $(seq 1 30); do
            RESP=$(curl -s -w "\n%{http_code}" --connect-timeout 5 --max-time 15 "$URL" 2>/dev/null) || true
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Attempt $i/30: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q "$EXPECTED_SHA"; then
              echo "New instance confirmed — smoke test passed."
              exit 0
            fi
            sleep 10
          done
          echo "New instance did not become healthy within 5 minutes."
          exit 1

      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_BACKEND }}
        with:
          environment: production
          version: ${{ github.sha }}
