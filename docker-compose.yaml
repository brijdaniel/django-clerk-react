# Local development stack

services:
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # expose the port for dbeaver etc
    env_file:
      - backend/.env

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["api"]
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv  # preserve container's venv from being overwritten by host mount
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DB_CONN_MAX_AGE=0
      - DB_POOL=false
      - CONTAINER_ROLE=api
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["worker"]
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    env_file:
      - backend/.env
    environment:
      - DB_CONN_MAX_AGE=0
      - DB_POOL=false
      - CONTAINER_ROLE=worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["beat"]
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    env_file:
      - backend/.env
    environment:
      - DB_CONN_MAX_AGE=0
      - DB_POOL=false
      - CONTAINER_ROLE=beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-bookworm-slim
    working_dir: /frontend
    command: sh -c "npm install && apt-get update -qq && npx playwright install --with-deps && npm run dev -- --host"  # this is only intended for dev!
    volumes:
      - ./frontend:/frontend
    ports:
      - "5173:5173"
    env_file:
      - frontend/.env
    environment:
      - E2E_API_BASE_URL=http://backend:8000
      - VITE_API_BASE_URL=
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    # Required for Playwright/Chromium to run inside the container
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE

volumes:
  postgres_data:
  backend_venv:  # persists the container's .venv so host volume mount doesn't overwrite it
